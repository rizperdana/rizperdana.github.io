<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rizki Perdana | Software Engineer</title>
  
  <!-- Tailwind CSS + DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- Configure Tailwind with Flexoki colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            flexoki: {
              bg: '#1C1B1A',
              'bg-2': '#282726',
              'bg-3': '#403E3C',
              'bg-4': '#575653',
              text: '#CECDC3',
              muted: '#B7B5AC',
              subtle: '#6F6E69',
              // Accent colors
              primary: '#4385BE',
              'primary-dark': '#205EA6',
              secondary: '#8B7EC8',
              'secondary-dark': '#5E409D',
              accent: '#D14D41',
              'accent-dark': '#AF3029',
              info: '#3AA99F',
              'info-dark': '#24837B',
              success: '#879A39',
              'success-dark': '#66800B',
              warning: '#D0A215',
              'warning-dark': '#AD8301',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Matrix canvas background */
    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-flexoki-bg min-h-screen text-flexoki-text relative">
  
  <!-- Matrix Rain Canvas -->
  <canvas id="matrix-canvas"></canvas>
  
  <!-- Glass Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 backdrop-blur-xl bg-flexoki-bg/85 border-b border-white/5">
    <div class="container mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <a href="index.html" class="text-xl font-bold text-flexoki-text hover:text-flexoki-primary transition-colors">
          Rizki Perdana
        </a>
        <div class="flex items-center gap-6">
          <a href="index.html" class="text-flexoki-primary font-medium hover:text-flexoki-secondary transition-colors">Home</a>
          <a href="cv.html" class="text-flexoki-text/70 font-medium hover:text-flexoki-primary transition-colors">CV</a>
          <a href="blog/index.html" class="text-flexoki-text/70 font-medium hover:text-flexoki-primary transition-colors">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container mx-auto px-4 pt-28 pb-12 relative z-10">
    
    <!-- Hero Section -->
    <section class="mb-16">
      <div class="max-w-4xl mx-auto">
        <!-- Decorative gradient orbs -->
        <div class="fixed top-20 left-10 w-72 h-72 bg-flexoki-primary/10 rounded-full blur-3xl -z-10"></div>
        <div class="fixed top-40 right-10 w-96 h-96 bg-flexoki-secondary/10 rounded-full blur-3xl -z-10"></div>
        
        <div class="relative bg-gradient-to-br from-flexoki-bg-2/90 to-flexoki-bg/90 backdrop-blur-xl rounded-3xl p-8 md:p-12 border border-white/5 shadow-2xl">
          <!-- Glow effect -->
          <div class="absolute inset-0 rounded-3xl bg-gradient-to-r from-flexoki-primary/5 via-flexoki-secondary/5 to-flexoki-accent/5 opacity-50"></div>
          
          <div class="relative">
            <h1 class="text-4xl md:text-5xl font-bold text-flexoki-text mb-4">
              Rizki <span class="text-flexoki-primary">Perdana</span>
            </h1>
            <p class="text-xl text-flexoki-primary font-medium mb-6" id="title">
              Software Engineer
            </p>
            <p class="text-lg text-flexoki-muted leading-relaxed mb-8 max-w-2xl" id="summary">
              Loading...
            </p>
            
            <!-- Contact Links -->
            <div class="flex flex-wrap gap-3" id="contacts"></div>

            <!-- CTA Buttons -->
            <div class="flex flex-wrap gap-4 mt-8">
              <a href="cv.html" class="btn bg-flexoki-primary/20 border-flexoki-primary/30 text-flexoki-text hover:bg-flexoki-primary/30 hover:border-flexoki-primary/50 gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                View CV
              </a>
              <a href="blog/index.html" class="btn bg-flexoki-secondary/20 border-flexoki-secondary/30 text-flexoki-text hover:bg-flexoki-secondary/30 hover:border-flexoki-secondary/50 gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                Read Blog
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section class="mb-16">
      <div class="flex items-center gap-4 mb-8">
        <h2 class="text-2xl font-bold text-flexoki-text">Featured Projects</h2>
        <div class="h-px flex-1 bg-gradient-to-r from-flexoki-primary to-transparent"></div>
      </div>
      
      <div class="grid md:grid-cols-2 gap-6" id="projects-container">
        <!-- Projects loaded dynamically -->
        <div class="bg-flexoki-bg-2/50 rounded-2xl p-6 border border-white/5">
          <div class="animate-pulse">
            <div class="h-6 bg-flexoki-bg-3 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-flexoki-bg-3 rounded w-full mb-2"></div>
            <div class="h-4 bg-flexoki-bg-3 rounded w-2/3"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Blog Preview Section -->
    <section>
      <div class="flex items-center gap-4 mb-8">
        <h2 class="text-2xl font-bold text-flexoki-text">Latest Articles</h2>
        <div class="h-px flex-1 bg-gradient-to-r from-flexoki-secondary to-transparent"></div>
        <a href="blog/index.html" class="text-flexoki-primary font-medium hover:text-flexoki-accent transition-colors">
          View all →
        </a>
      </div>
      
      <div class="grid md:grid-cols-3 gap-6" id="blog-container">
        <!-- Blog posts loaded dynamically -->
        <div class="bg-flexoki-bg-2/50 rounded-2xl p-6 border border-white/5">
          <div class="animate-pulse">
            <div class="h-5 bg-flexoki-bg-3 rounded w-3/4 mb-4"></div>
            <div class="h-4 bg-flexoki-bg-3 rounded w-full mb-2"></div>
            <div class="h-4 bg-flexoki-bg-3 rounded w-1/2"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="border-t border-white/5 py-8 mt-12">
    <div class="container mx-auto px-4 text-center">
      <p class="text-flexoki-subtle text-sm">
        Built with 
        <span class="text-flexoki-primary">DaisyUI</span> + 
        <span class="text-flexoki-secondary">Tailwind</span> + 
        <span class="text-flexoki-accent">Flexoki</span>
      </p>
      <p class="text-flexoki-subtle text-xs mt-2">
        © 2026 Rizki Perdana. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Scripts -->
  <script>
    let profileData = null;
    let projectsData = null;
    let postsData = null;

    async function loadData() {
      try {
        const [profileRes, projectsRes, postsRes] = await Promise.all([
          fetch('profile.json'),
          fetch('projects.json'),
          fetch('posts.json')
        ]);

        profileData = await profileRes.json();
        projectsData = await projectsRes.json();
        postsData = await postsRes.json();

        loadHome();
        loadProjects();
        loadBlogPreview();
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('summary').textContent = 'Error loading data. Please refresh the page.';
      }
    }

    function loadHome() {
      if (!profileData) return;

      document.getElementById('title').textContent = profileData.title || '';
      document.getElementById('summary').textContent = profileData.summary || '';

      if (profileData.contacts && Array.isArray(profileData.contacts)) {
        const contactsHtml = profileData.contacts.map(contact => {
          let icon = '📍';
          let href = '#';
          
          if (contact.includes('@')) {
            icon = '✉️';
            href = `mailto:${contact}`;
          } else if (contact.includes('linkedin')) {
            icon = '💼';
            href = contact;
          } else if (contact.includes('github.io')) {
            icon = '🌐';
            href = contact;
          } else if (contact.includes('+')) {
            icon = '📱';
          }
          
          if (href === '#') {
            return `<span class="px-3 py-2 rounded-full bg-white/5 border border-white/10 text-sm">${icon} ${contact}</span>`;
          }
          return `<a href="${href}" target="_blank" class="px-3 py-2 rounded-full bg-white/5 border border-white/10 text-sm hover:bg-flexoki-primary/20 hover:border-flexoki-primary/30 transition-all">${icon} ${contact}</a>`;
        }).join('');

        document.getElementById('contacts').innerHTML = contactsHtml;
      }
    }

    function loadProjects() {
      const container = document.getElementById('projects-container');

      if (!projectsData || !projectsData.projects || projectsData.projects.length === 0) {
        container.innerHTML = '<p class="text-flexoki-muted">No projects available yet.</p>';
        return;
      }

      const toShow = projectsData.projects.slice(0, 2);

      container.innerHTML = toShow.map(project => `
        <div class="bg-gradient-to-br from-flexoki-bg-2/60 to-flexoki-bg/60 backdrop-blur-sm rounded-2xl p-6 border border-white/5 hover:border-flexoki-primary/30 hover:bg-flexoki-bg-2/80 transition-all duration-300 group">
          <h3 class="text-xl font-bold text-flexoki-text mb-3 group-hover:text-flexoki-primary transition-colors">${project.title || 'Untitled'}</h3>
          <p class="text-flexoki-muted mb-4">${project.description || ''}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            ${(project.technologies || []).slice(0, 4).map(tech => 
              `<span class="px-2 py-1 rounded-md bg-white/5 border border-white/10 text-xs text-flexoki-secondary">${tech}</span>`
            ).join('')}
          </div>
          ${project.url ? `
            <a href="${project.url}" target="_blank" class="inline-flex items-center gap-1 text-flexoki-primary hover:text-flexoki-secondary transition-colors">
              View Project 
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
            </a>
          ` : ''}
        </div>
      `).join('');
    }

    function loadBlogPreview() {
      const container = document.getElementById('blog-container');

      if (!postsData || !postsData.posts || postsData.posts.length === 0) {
        container.innerHTML = `
          <div class="col-span-3 text-center py-8">
            <p class="text-flexoki-muted">No blog posts yet. Check back soon!</p>
          </div>
        `;
        return;
      }

      const latestPosts = postsData.posts.slice(0, 3);

      container.innerHTML = latestPosts.map(post => `
        <a href="blog/post.html?slug=${post.slug}" class="block bg-gradient-to-br from-flexoki-bg-2/60 to-flexoki-bg/60 backdrop-blur-sm rounded-2xl p-6 border border-white/5 hover:border-flexoki-secondary/30 hover:bg-flexoki-bg-2/80 transition-all duration-300 group">
          <span class="text-xs text-flexoki-subtle mb-2 block">${post.date || ''}</span>
          <h3 class="text-lg font-bold text-flexoki-text mb-2 group-hover:text-flexoki-primary transition-colors">
            ${post.title || 'Untitled'}
          </h3>
          <p class="text-sm text-flexoki-muted line-clamp-3">${post.excerpt || ''}</p>
          <span class="inline-flex items-center gap-1 text-flexoki-primary text-sm mt-4 group-hover:translate-x-1 transition-transform">
            Read more 
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </span>
        </a>
      `).join('');
    }

    loadData();
  </script>
  
  <!-- Matrix Rain Animation -->
  <script>
    (function() {
      const canvas = document.getElementById('matrix-canvas');
      const ctx = canvas.getContext('2d');
      
      // Flexoki-inspired colors for the matrix rain (cyan/green tones)
      const colors = ['#3AA99F', '#24837B', '#4385BE', '#205EA6', '#879A39', '#66800B'];
      
      let width, height;
      let columns = [];
      let animationId;
      
      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        // Calculate columns based on font size
        const fontSize = 12;
        columns = [];
        for (let x = 0; x < width; x += fontSize) {
          columns[x] = {
            y: Math.random() * height,
            speed: 1 + Math.random() * 3,
            chars: []
          };
        }
      }
      
      function drawMatrix() {
        // Semi-transparent background for trail effect
        ctx.fillStyle = 'rgba(28, 27, 26, 0.05)';
        ctx.fillRect(0, 0, width, height);
        
        const fontSize = 12;
        ctx.font = fontSize + 'px monospace';
        
        columns.forEach((col, x) => {
          // Random character
          const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
          const char = chars[Math.floor(Math.random() * chars.length)];
          
          // Draw the character with a fade effect
          const opacity = 0.3 + Math.random() * 0.5;
          ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
          ctx.globalAlpha = opacity;
          ctx.fillText(char, x, col.y);
          
          // Move down
          col.y += col.speed;
          
          // Reset to top randomly
          if (col.y > height && Math.random() > 0.975) {
            col.y = 0;
          }
        });
        
        ctx.globalAlpha = 1;
        animationId = requestAnimationFrame(drawMatrix);
      }
      
      // Initialize
      resize();
      window.addEventListener('resize', resize);
      
      // Start animation with delay for smooth page load
      setTimeout(() => {
        drawMatrix();
      }, 500);
      
      // Reduce animation on tab visibility change
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          cancelAnimationFrame(animationId);
        } else {
          animationId = requestAnimationFrame(drawMatrix);
        }
      });
    })();
  </script>
</body>
</html>
